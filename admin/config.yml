backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"

collections:
  - name: "case-studies"
    label: "Case Studies"
    folder: "_case-studies"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Company", name: "company", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "The Problem", name: "problem", widget: "text" }
      - { label: "My Role", name: "my_role", widget: "text" }
      - { label: "Solution", name: "solution", widget: "text" }
      - { label: "Key Takeaway", name: "takeaway", widget: "text" }
